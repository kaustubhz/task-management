<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Management - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 32px;
        }
        
        h3 {
            color: #666;
            font-weight: normal;
            margin-bottom: 40px;
        }
        
        .oauth-btn {
            width: 100%;
            padding: 16px 30px;
            margin: 15px 0;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            border-radius: 10px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            display: inline-block;
            color: white;
        }
        
        .oauth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        
        .keycloak-btn {
            background: linear-gradient(135deg, #4285F4 0%, #0F5DA9 100%);
        }
        
        .local-info {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 2px solid #eee;
        }
        
        .local-info h4 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .local-info p {
            color: #666;
            line-height: 1.6;
            margin: 5px 0;
        }
        
        .code {
            background: #f5f5f5;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>📋 Task Management System</h1>
        <h3>Welcome! Please sign in to continue</h3>
        
        <a href="/oauth2/authorization/keycloak" class="oauth-btn keycloak-btn">
            🔐 Sign in with Keycloak
        </a>
        
        <div class="local-info">
            <h4>API Access</h4>
            <p>For API/Postman testing, use <span class="code">HTTP Basic Auth</span></p>
            <p style="margin-top: 10px;">
                <strong>Local Users:</strong><br>
                <span class="code">user:password123</span><br>
                <span class="code">manager:password123</span><br>
                <span class="code">admin:password123</span>
            </p>
        </div>
    </div>
</body>
</html>
