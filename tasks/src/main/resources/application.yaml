spring:
  application:
    name: tasks

  # MongoDB Configuration
  mongodb:
    uri: ${MONGO_URI:-mongodb://admin:password@localhost:27017/taskdb?authSource=admin}
    database: ${MONGO_DATABASE:-taskdb}

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:-localhost}
      port: ${REDIS_PORT:-6379}

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: task-management-client
            client-secret: ${KEYCLOAK_CLIENT_SECRET:-changeme}
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            issuer-uri: "${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/task-management}"
            user-name-attribute: preferred_username

# Server Configuration
server:
  port: 8088

# Logging Configuration
logging:
  level:
    root: INFO
    com.management.tasks: DEBUG
    org.springframework.security: DEBUG
    org.springframework.web: DEBUG

# Actuator Configuration
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
