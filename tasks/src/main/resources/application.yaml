spring:
  application:
    name: tasks

  # MongoDB Configuration (Local Docker)
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://admin:password@localhost:27017/taskdb?authSource=admin}
      database: taskdb

  # H2 Database Configuration
  datasource:
    url: jdbc:h2:mem:taskdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # H2 Console (access at http://localhost:8080/h2-console)
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA/Hibernate Configuration
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    defer-datasource-initialization: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: task-management-client
            client-secret: ${KEYCLOAK_CLIENT_SECRET:changeme}
            scope:
              - openid
              - profile
              - email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            issuer-uri: http://localhost:8180/realms/task-management
            user-name-attribute: preferred_username

# Server Configuration
server:
  port: 8080
